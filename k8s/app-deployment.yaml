apiVersion: apps/v1
kind: Deployment
metadata:
  name: adventure-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: adventure

  template:
    metadata:
      labels:
        app: adventure

    spec:
      containers:
      - name: adventure

        image: YOUR_DOCKER_IMAGE

        env:
        - name: DB_HOST
          value: mysql

        ports:
        - containerPort: 3000
